# vim: set ft=tmux:

# tmux sensible see: https://github.com/tmux-plugins/tmux-sensible?tab=readme-ov-file#options
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Upgrade $TERM
set -g default-terminal "tmux-256color"

# Enable extended keys for proper modifier key support.
# Pi now requests keyboard protocol support itself, so tmux can use the
# standard on-demand mode instead of the older `always` workaround.
set -g extended-keys on
set -g extended-keys-format csi-u

# Tell tmux the outer terminal supports extended keys
# First `set -s` clears the array (prevents duplicates on reload),
# then `-as` appends additional entries
set -s terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:extkeys'
set -as terminal-features 'screen*:title'
set -as terminal-features 'rxvt*:ignorefkeys'

# Refresh GUI/session environment variables from the attaching client.
# This keeps Wayland clipboard access working inside long-lived tmux servers,
# which Pi needs for Ctrl+V image paste on Linux.
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_RUNTIME_DIR DBUS_SESSION_BUS_ADDRESS HYPRLAND_INSTANCE_SIGNATURE KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on


# Config

# Set shell to fish (detect common Homebrew/macOS/Linux install paths)
if-shell "test -f /opt/homebrew/bin/fish" \
  "set-option -g default-shell /opt/homebrew/bin/fish" \
  "if-shell 'test -f /usr/local/bin/fish' 'set-option -g default-shell /usr/local/bin/fish' 'if-shell \"test -f /usr/bin/fish\" \"set-option -g default-shell /usr/bin/fish\" \"set-option -g default-shell /bin/sh\"'"

# Unbind the default prefix key
unbind C-b

# Bind <C-x> as the prefix key
unbind C-x
set -g prefix C-x
bind C-x send-prefix

# Enable mouse support
set -g mouse on

# Sesh (smart tmux session manager) configuration
# Requires: zoxide, fzf, sesh
set -g detach-on-destroy off  # Don't exit tmux when closing last pane

# Sesh keybindings
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
bind -N "last-session (via sesh) " L run-shell "sesh last"
bind -N "switch to root session (via sesh) " 9 run-shell "sesh connect --root $(pwd)"
bind-key "W" run-shell "sesh window \"$(sesh window | fzf-tmux -p 60%,50% --prompt '🪟  ')\""
bind-key "R" display-popup -E -w 40% "sesh connect \"$(
  sesh list -i -H | fzf --height 40% --reverse --border-label ' sesh ' --border \
    --prompt '⚡  ' --bind 'tab:down,btab:up' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --value \"$(sesh root)\" \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Pane resizing with vim-like keys (-r allows repeat without prefix)
# Use - and = for vertical, [ and ] for horizontal resizing
bind -r - resize-pane -D 2
bind -r = resize-pane -U 2
bind -r ] resize-pane -R 2
bind -r [ resize-pane -L 2

# Bind delete key to equalize all panes using tiled layout
bind -r DC select-layout tiled

# Window and pane creation with current path preservation
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"  # Backslash for horizontal split
bind Enter split-window -v -c "#{pane_current_path}"        # Enter for vertical split
bind c new-window -c "#{pane_current_path}"                 # New window in current path

# Bind x to kill current pane
bind x kill-pane

# Bind m to maximize the current pane
unbind z
unbind m
bind m resize-pane -Z

# Bind r to reload tmux config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded 🚀"

# Enable vim keys for copy mode
set-window-option -g mode-keys vi

# Copy mode with vim-like keybindings
bind v copy-mode  # Enter copy mode with prefix+v

# Copy mode navigation and selection (vim-style)
bind -T copy-mode-vi q send-keys -X cancel                    # q to exit copy mode
bind -T copy-mode-vi v send-keys -X begin-selection           # v to start selection
bind -T copy-mode-vi V send-keys -X select-line               # V to select entire line
bind -T copy-mode-vi Escape send-keys -X clear-selection      # Escape to clear selection
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle      # Ctrl+v for block selection

# Copy: use pbcopy on macOS, wl-copy on Wayland, xclip on X11
if-shell "command -v pbcopy" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "if-shell 'command -v wl-copy' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"; \
     bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"wl-copy\"' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\"; \
     bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\"'"

# Status bar positioning
set-option -g status-position top
set -g status 1
set -g status-format[1] ""

# Start window and pane numbering at 1 (more intuitive than 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on  # Automatically renumber windows when one is closed

# Enable pane navigation while in copy mode (works with vim-tmux-navigator)
bind -T copy-mode-vi 'C-h' select-pane -L      # Left pane
bind -T copy-mode-vi 'C-j' select-pane -D      # Down pane
bind -T copy-mode-vi 'C-k' select-pane -U      # Up pane
bind -T copy-mode-vi 'C-l' select-pane -R      # Right pane
bind -T copy-mode-vi 'C-\' select-pane -l     # Last pane
bind -T copy-mode-vi 'C-Space' select-pane -t:.+  # Next pane


# Plugin Management
set -g @plugin 'tmux-plugins/tpm'  # Tmux Plugin Manager

# Which-key style popup menu
# Source the generated tmux script directly for portability.
# The upstream plugin bootstrap relies on GNU realpath flags that fail on macOS.
# Source config lives in ~/.config/tmux/which-key/config.yaml.
# Runtime file lives in ~/.config/tmux/which-key/init.tmux.

# Seamless navigation between vim and tmux panes
# Disabled because it binds root-table Ctrl+H/J/K/L, which conflicts with pi.
# set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme Configuration
# Using custom fork of catppuccin theme with local Cloudflare overrides.
# IMPORTANT: Theme must load BEFORE continuum to avoid overwriting status-right
set -g @plugin 'dmmulroy/catppuccin-tmux'

set -g @catppuccin_window_status_enable "yes"
set -g @catppuccin_window_status_icon_enable "yes"

set -g @catppuccin_icon_window_zoom " "
set -g @catppuccin_icon_window_last "null"
set -g @catppuccin_icon_window_current "null"
set -g @catppuccin_icon_window_mark "null"
set -g @catppuccin_icon_window_silent "null"
set -g @catppuccin_icon_window_activity "null"
set -g @catppuccin_icon_window_bell "null"

set -g @catppuccin_window_middle_separator "null"
set -g @catppuccin_window_default_fill "all"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_maximized_text "null"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"

if-shell "[ \"$($HOME/.local/bin/theme-mode get 2>/dev/null || echo dark)\" = light ]" \
  "set -g @catppuccin_flavour 'latte'; \
   set -g @catppuccin_window_default_background '#ffffff'; \
   set -g @catppuccin_window_default_color '#161616'; \
   set -g @catppuccin_window_current_background '#f48120'; \
   set -g @catppuccin_window_current_color '#ffffff'; \
   set -g @catppuccin_directory_color '#f48120'; \
   set -g status-style 'bg=#ffffff,fg=#161616'" \
  "set -g @catppuccin_flavour 'mocha'; \
   set -g @catppuccin_window_default_background '#ffffff'; \
   set -g @catppuccin_window_default_color '#050505'; \
   set -g @catppuccin_window_current_background '#101010'; \
   set -g @catppuccin_window_current_color '#f48120'; \
   set -g @catppuccin_directory_color '#f48120'; \
   set -g status-style 'bg=#050505,fg=#ffffff'"

# Session persistence - save and restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'      # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'     # Restore neovim sessions
set -g @resurrect-capture-pane-contents 'on'  # Save pane contents

# Automatic session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'         # Auto-restore last saved session
set -g @continuum-boot 'on'            # Auto-start tmux on boot
set -g @continuum-save-interval '10'   # Save every 10 minutes

# Set custom plugin directory outside the stow-managed config tree.
# Empty local plugin directories under ~/.config/tmux can prevent TPM bootstrap,
# so keep runtime plugin clones in ~/.local/share instead.
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# Auto-install TPM if not present.
if-shell "test ! -x ~/.local/share/tmux/plugins/tpm/tpm" \
  "run-shell \"mkdir -p ~/.local/share/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm\""

# Auto-install declared plugins on first boot if the Catppuccin theme plugin is missing.
if-shell "test -x ~/.local/share/tmux/plugins/tpm/bin/install_plugins && test ! -d ~/.local/share/tmux/plugins/catppuccin-tmux" \
  "run-shell ~/.local/share/tmux/plugins/tpm/bin/install_plugins"

# Load the generated which-key menu after TMUX_PLUGIN_MANAGER_PATH is set
source-file ~/.config/tmux/which-key/init.tmux

# Initialize TPM.
run-shell ~/.local/share/tmux/plugins/tpm/tpm

# Post-plugin status-line polish.
# Catppuccin Latte still leaves some gray surfaces in the status bar that clash
# with the Cloudflare light theme, so override the final rendered formats.
if-shell "[ \"$($HOME/.local/bin/theme-mode get 2>/dev/null || echo dark)\" = light ]" \
  "set -g status-style 'bg=#fafafa,fg=#161616'; \
   set -g window-status-separator ''; \
   set -g window-status-format '#[fg=#161616,bg=#fafafa] #I #W '; \
   set -g window-status-current-format '#[fg=#ffffff,bg=#f48120,bold] #I #W '; \
   set -g status-left ''; \
   set -g status-right '#[fg=#d96d00,bg=#fafafa]  #[fg=#161616,bg=#fafafa] #{b:pane_current_path} #[fg=#{?client_prefix,#ffffff,#161616},bg=#{?client_prefix,#f48120,#ececec}] session #[fg=#161616,bg=#fafafa] #S '"
