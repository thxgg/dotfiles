# HubSpot CRM MCP. Add HUBSPOT_PRIVATE_APP_ACCESS_TOKEN_STAGING and
# HUBSPOT_PRIVATE_APP_ACCESS_TOKEN_PROD to ~/.env.secrets.
[mcp_servers.hubspot_staging]
command = "sh"
args = ["-lc", 'PRIVATE_APP_ACCESS_TOKEN="$HUBSPOT_PRIVATE_APP_ACCESS_TOKEN_STAGING" exec npx -y @hubspot/mcp-server']
env_vars = ["HUBSPOT_PRIVATE_APP_ACCESS_TOKEN_STAGING"]
default_tools_approval_mode = "prompt"
enabled = true

[mcp_servers.hubspot_prod]
command = "sh"
args = ["-lc", 'PRIVATE_APP_ACCESS_TOKEN="$HUBSPOT_PRIVATE_APP_ACCESS_TOKEN_PROD" exec npx -y @hubspot/mcp-server']
env_vars = ["HUBSPOT_PRIVATE_APP_ACCESS_TOKEN_PROD"]
default_tools_approval_mode = "prompt"
enabled = true

# Transferred from Pi's ephemeral MCP catalog. Keep these disabled globally
# because Pi made them opt-in per project/session rather than always-on.
[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
enabled = false

[mcp_servers.shortcut]
command = "npx"
args = ["-y", "@shortcut/mcp@latest"]
env_vars = ["SHORTCUT_API_TOKEN"]
enabled = false

[mcp_servers.sonarqube]
command = "docker"
args = ["run", "-i", "--rm", "-e", "SONARQUBE_TOKEN", "-e", "SONARQUBE_URL", "mcp/sonarqube"]
env_vars = ["SONARQUBE_TOKEN"]
enabled = false

[mcp_servers.sonarqube.env]
SONARQUBE_URL = "https://sonar.codehospitality.app"

[mcp_servers.db_staging]
