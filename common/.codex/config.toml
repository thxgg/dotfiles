args = ["-lc", 'DATABASE_URI="$DATABASE_URI_STAGING" exec docker run -i --rm --network=host -e DATABASE_URI crystaldba/postgres-mcp --access-mode=unrestricted']
env_vars = ["DATABASE_URI_STAGING"]
